<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Meine Todo App</title>
  </head>

  <body>
    <div class="title">
      <h1>Meine To-Do-Liste</h1>
    </div>

    <div class="inputButton">
      <input
        class="eingabefeld"
        type="text"
        id="neueAufgabe"
        placeholder="Neuen Task hinzufügen" />
      <button onclick="neueAufgabeHinzufuegen()">Hinzufügen</button>
    </div>

    <div class="liste">
      <ul id="todoListe"></ul>
    </div>

    <script src="todo.js"></script>
  </body>
</html>
