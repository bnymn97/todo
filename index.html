<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Meine Todo App</title>
  </head>

  <body>
    <div class="menu">
      <img src="menu.png" alt="" />
      <div class="dropdown">
        <div class="submenu">
          <p>Aufgaben Archiv</p>
          <div class="subdrop">
            <p>hier stehen die erledigten Aufgaben</p>
          </div>
        </div>
      </div>
    </div>

    <div class="title">
      <h1>Meine To-Do-Liste</h1>
    </div>

    <div class="inputButton">
      <input
        class="eingabefeld"
        type="text"
        id="neueAufgabe"
        placeholder="Neuen Task hinzufügen" />
      <button onclick="neueAufgabeHinzufuegen()">Hinzufügen</button>
    </div>

    <div class="liste">
      <ul id="todoListe"></ul>
    </div>

    <div class="motivation">
      <h4>Spruch des Tages:</h4>
      <p class="spruch">
        "Träume groß, arbeite hart, sei freundlich. Erfolg beginnt mit einem
        Schritt nach dem anderen – du schaffst das!"
      </p>
    </div>

    <script src="todo.js"></script>
  </body>
</html>
